<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2fff"/>
    </linearGradient>
    <linearGradient id="wing" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <g stroke="#00d4ff" stroke-width="0.5" opacity="0.08">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <g transform="translate(256, 200)">
    <path d="M 0,-90 C -55,-90 -90,-55 -90,0 L -90,35 L -60,35 L -60,5 C -60,-25 -35,-45 0,-45 C 35,-45 60,-25 60,5 L 60,35 L 90,35 L 90,0 C 90,-55 55,-90 0,-90 Z" fill="none" stroke="url(#accent)" stroke-width="5" opacity="0.95"/>
    <line x1="0" y1="-90" x2="0" y2="-45" stroke="url(#accent)" stroke-width="3"/>
    <g transform="translate(-95, -20) rotate(-20)">
      <path d="M 0,0 C -25,-10 -65,-35 -95,-50 C -70,-30 -40,-15 -20,-5 Z" fill="url(#wing)" stroke="#00d4ff" stroke-width="2.5"/>
      <path d="M 0,10 C -20,5 -55,-10 -80,-25 C -60,-10 -35,0 -15,10 Z" fill="url(#wing)" stroke="#00d4ff" stroke-width="2.5" opacity="0.7"/>
      <path d="M 0,22 C -18,18 -45,8 -65,0 C -50,5 -30,15 -10,22 Z" fill="url(#wing)" stroke="#00d4ff" stroke-width="2.5" opacity="0.45"/>
      <line x1="0" y1="0" x2="-95" y2="-50" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
      <line x1="0" y1="10" x2="-80" y2="-25" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
      <line x1="0" y1="22" x2="-65" y2="0" stroke="#00d4ff" stroke-width="1.5" opacity="0.35"/>
    </g>
    <g transform="translate(95, -20) scale(-1, 1) rotate(-20)">
      <path d="M 0,0 C -25,-10 -65,-35 -95,-50 C -70,-30 -40,-15 -20,-5 Z" fill="url(#wing)" stroke="#00d4ff" stroke-width="2.5"/>
      <path d="M 0,10 C -20,5 -55,-10 -80,-25 C -60,-10 -35,0 -15,10 Z" fill="url(#wing)" stroke="#00d4ff" stroke-width="2.5" opacity="0.7"/>
      <path d="M 0,22 C -18,18 -45,8 -65,0 C -50,5 -30,15 -10,22 Z" fill="url(#wing)" stroke="#00d4ff" stroke-width="2.5" opacity="0.45"/>
      <line x1="0" y1="0" x2="-95" y2="-50" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
      <line x1="0" y1="10" x2="-80" y2="-25" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
      <line x1="0" y1="22" x2="-65" y2="0" stroke="#00d4ff" stroke-width="1.5" opacity="0.35"/>
    </g>
    <circle cx="0" cy="-60" r="5" fill="#00d4ff" opacity="0.9"/>
    <circle cx="0" cy="-60" r="12" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4">
      <animate attributeName="r" values="12;18;12" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/>
