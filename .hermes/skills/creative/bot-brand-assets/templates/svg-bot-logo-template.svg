  <text x="256" y="375" text-anchor="middle" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="26" font-weight="300" fill="#00d4ff" opacity="0.85" letter-spacing="6">AGENT</text>
  <line x1="140" y1="395" x2="372" y2="395" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>
